<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wie Wil Miljoenêr Wees? | Graad 8 EBW</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',Arial,sans-serif;background:#000;color:white;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a1628 0%,#000510 60%,#000 100%);z-index:0}
.stars{position:fixed;inset:0;z-index:0;overflow:hidden}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.screen{display:none;position:relative;z-index:10;min-height:100vh;padding:2rem;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
.show-title{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,3rem);font-weight:900;text-align:center;background:linear-gradient(180deg,#fff 0%,#FFD700 40%,#FFA500 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.25rem;letter-spacing:2px}
.show-sub{color:#aaa;text-align:center;margin-bottom:0.25rem;font-size:0.9rem}
.show-sub2{color:#FFD700;opacity:0.8;text-align:center;margin-bottom:0.5rem;font-size:0.8rem}
.brand-tag{font-size:0.7rem;color:#444;text-align:center;margin-bottom:2rem;letter-spacing:3px;text-transform:uppercase}
.hotspot{width:120px;height:120px;border-radius:50%;border:3px solid #FFD700;box-shadow:0 0 30px #FFD700,0 0 60px rgba(255,215,0,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px #FFD700,0 0 40px rgba(255,215,0,0.2)}50%{box-shadow:0 0 40px #FFD700,0 0 80px rgba(255,215,0,0.5)}}
.hotspot-inner{font-size:2.5rem}
.input-group{width:100%;max-width:420px;margin-bottom:0.85rem}
.input-group label{display:block;font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.input-group input,.input-group select{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.3);border-radius:8px;color:white;font-size:15px;transition:border-color 0.3s}
.input-group input:focus,.input-group select:focus{outline:none;border-color:#FFD700;box-shadow:0 0 10px rgba(255,215,0,0.2)}
.input-group select option{background:#0a1628}
.btn-start{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;border-radius:50px;padding:16px 50px;font-size:18px;font-weight:700;cursor:pointer;margin-top:1rem;font-family:'Cinzel',serif;letter-spacing:2px;box-shadow:0 0 20px rgba(255,165,0,0.5);transition:all 0.3s;text-transform:uppercase}
.btn-start:hover{transform:scale(1.05);box-shadow:0 0 35px rgba(255,165,0,0.8)}
.game-wrap{position:relative;width:100%;max-width:900px}
.main-content{display:flex;flex-direction:column;align-items:center;padding-right:150px}
.prize-ladder{position:absolute;right:0;top:0;width:140px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:8px 4px}
.prize-item{font-size:11px;padding:4px 8px;border-radius:4px;color:#444;text-align:right;transition:all 0.3s}
.prize-item.current{color:#FFD700;font-weight:700;background:rgba(255,215,0,0.15)}
.prize-item.milestone{color:#90EE90}
.prize-item.passed{color:#222;text-decoration:line-through}
.hud{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:0.5rem}
.hud-info{font-size:12px;color:#888}
.hud-prize{font-family:'Cinzel',serif;font-size:16px;color:#FFD700;font-weight:700}
.lifelines{display:flex;gap:10px;margin:0.5rem 0;flex-wrap:wrap;justify-content:center}
.ll-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.4);border-radius:50px;padding:8px 18px;color:#FFD700;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;transition:all 0.3s;text-transform:uppercase}
.ll-btn:hover:not(:disabled){background:rgba(255,215,0,0.15);box-shadow:0 0 15px rgba(255,215,0,0.3)}
.ll-btn:disabled{opacity:0.2;cursor:not-allowed}
.question-box{width:100%;background:linear-gradient(135deg,rgba(10,30,80,0.9),rgba(0,10,40,0.95));border-radius:12px;padding:2px;margin:0.75rem 0;background:linear-gradient(135deg,#FFD700,#FFA500,#FFD700)}
.question-box-inner{background:linear-gradient(135deg,rgba(5,15,50,0.98),rgba(0,5,30,0.99));border-radius:10px;padding:1.5rem;text-align:center}
.question-num{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:2px}
.question-text{font-size:clamp(0.9rem,2.5vw,1.1rem);line-height:1.6;color:#fff;font-weight:600}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin:0.75rem 0}
.ans-btn{background:linear-gradient(135deg,rgba(10,30,100,0.8),rgba(0,10,60,0.9));border:1px solid rgba(100,150,255,0.4);border-radius:8px;padding:14px 16px;color:white;cursor:pointer;font-size:13px;text-align:left;line-height:1.4;transition:all 0.25s;font-family:'Open Sans',sans-serif}
.ans-btn:hover:not(:disabled){border-color:#FFD700;box-shadow:0 0 15px rgba(255,215,0,0.3);transform:scale(1.01)}
.ans-btn .letter{display:inline-block;width:26px;height:26px;border-radius:50%;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);text-align:center;line-height:26px;font-size:12px;font-weight:700;color:#FFD700;margin-right:10px}
.ans-btn-inner{display:flex;align-items:center}
.ans-btn.correct{background:linear-gradient(135deg,rgba(0,120,0,0.9),rgba(0,80,0,0.95));border-color:#4CAF50;box-shadow:0 0 20px rgba(76,175,80,0.5)}
.ans-btn.correct .letter{background:rgba(76,175,80,0.3);border-color:#4CAF50;color:#4CAF50}
.ans-btn.wrong{background:linear-gradient(135deg,rgba(150,0,0,0.9),rgba(100,0,0,0.95));border-color:#f44336;box-shadow:0 0 20px rgba(244,67,54,0.5)}
.ans-btn.wrong .letter{background:rgba(244,67,54,0.3);border-color:#f44336;color:#f44336}
.ans-btn.hidden{opacity:0.08;pointer-events:none}
.ans-btn:disabled{cursor:default;transform:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:linear-gradient(135deg,#0a1628,#000d20);border:2px solid #FFD700;border-radius:16px;padding:2rem;max-width:440px;width:90%;text-align:center;box-shadow:0 0 50px rgba(255,165,0,0.3)}
.modal-box h3{font-family:'Cinzel',serif;color:#FFD700;margin-bottom:1rem;font-size:1.3rem}
.modal-box p{color:#ccc;font-size:13px;line-height:1.7;margin-bottom:0.5rem}
.modal-btns{display:flex;gap:10px;justify-content:center;margin-top:1.25rem;flex-wrap:wrap}
.btn-modal{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;border-radius:50px;padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cinzel',serif}
.audience-bars{display:flex;gap:14px;align-items:flex-end;height:100px;margin:1rem 0;justify-content:center}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:52px;background:linear-gradient(180deg,#FFD700,#FFA500);border-radius:4px 4px 0 0;transition:height 1.2s cubic-bezier(0.34,1.56,0.64,1);min-height:4px}
.bar-label{font-size:12px;color:#aaa}
.bar-pct{font-size:12px;color:#FFD700;font-weight:700}
.friend-qa{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:1rem;margin:0.75rem 0;font-size:12px;color:#ddd;text-align:left;line-height:1.8}
.result-icon{font-size:5rem;margin-bottom:0.75rem;animation:bounceIn 0.6s}
@keyframes bounceIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-prize{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,2.5rem);background:linear-gradient(180deg,#fff,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;margin-bottom:0.5rem}
.result-name{color:#888;font-size:13px;margin-bottom:1.5rem}
.proof-box{background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.3);border-radius:12px;padding:1.25rem;margin:0.75rem 0;width:100%;max-width:400px;text-align:center}
.proof-label{color:#888;font-size:11px;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:1px}
.proof-code{color:#FFD700;font-size:15px;font-weight:700;letter-spacing:2px;font-family:'Cinzel',serif}
.proof-date{color:#444;font-size:11px;margin-top:6px}
.music-note{position:fixed;font-size:1.5rem;animation:floatUp 3s ease-in forwards;z-index:1;pointer-events:none}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(-200px) rotate(20deg)}}
footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:6px;font-size:10px;color:#222;background:rgba(0,0,0,0.8);letter-spacing:2px;z-index:50}
@media(max-width:600px){.answers{grid-template-columns:1fr}.main-content{padding-right:0}.prize-ladder{display:none}}
</style>

<body>
<div class="bg"></div>
<div class="stars" id="stars"></div>

<!-- INTRO AUDIO -->
<audio id="bgMusic" loop>
  <source src="South African Millionaire.mp3" type="audio/mpeg">
</audio>

<!-- PROFIEL SKERM -->
<div id="profileScreen" class="screen active">

<script>
// STARS
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const d=document.createElement('div');
    d.className='star';
    const sz=Math.random()*2.5+0.5;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*0.7+0.1};animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s`;
    s.appendChild(d);
  }
})();

// AUDIO
const bgMusic=document.getElementById('bgMusic');
bgMusic.volume=0.4;

function startBgMusic(){
  bgMusic.play().catch(()=>{});
}

// Try autoplay + fallback on first interaction
window.addEventListener('load',()=>setTimeout(startBgMusic,500));
document.addEventListener('click',startBgMusic,{once:true});
document.addEventListener('touchstart',startBgMusic,{once:true});

// SOUND EFFECTS via Web Audio API
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function getCtx(){
  if(!actx){actx=new AudioCtx();}
  if(actx.state==='suspended')actx.resume();
  return actx;
}

function playCorrect(){
  const c=getCtx();
  const freqs=[523,659,784,1047,1319];
  freqs.forEach((f,i)=>{
    const o=c.createOscillator();
    const g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,c.currentTime+i*0.1);
    g.gain.linearRampToValueAtTime(0.3,c.currentTime+i*0.1+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.3);
    o.start(c.currentTime+i*0.1);
    o.stop(c.currentTime+i*0.1+0.35);
  });
}

function playWrong(){
  const c=getCtx();
  const freqs=[300,250,200,150];
  freqs.forEach((f,i)=>{
    const o=c.createOscillator();
    const g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0,c.currentTime+i*0.15);
    g.gain.linearRampToValueAtTime(0.25,c.currentTime+i*0.15+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.3);
    o.start(c.currentTime+i*0.15);
    o.stop(c.currentTime+i*0.15+0.35);
  });
}

function playWin(){
  const c=getCtx();
  const melody=[523,659,784,1047,784,1047,1319];
  melody.forEach((f,i)=>{
    const o=c.createOscillator();
    const g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,c.currentTime+i*0.15);
    g.gain.linearRampToValueAtTime(0.4,c.currentTime+i*0.15+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.4);
    o.start(c.currentTime+i*0.15);
    o.stop(c.currentTime+i*0.15+0.45);
  });
}

function playLifeline(){
  const c=getCtx();
  [440,550,660].forEach((f,i)=>{
    const o=c.createOscillator();
    const g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.2,c.currentTime+i*0.1);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.2);
    o.start(c.currentTime+i*0.1);
    o.stop(c.currentTime+i*0.1+0.25);
  });
}

function spawnNote(){
  const notes=['♩','♪','♫','♬'];
  const n=document.createElement('div');
  n.className='music-note';
  n.textContent=notes[Math.floor(Math.random()*notes.length)];
  n.style.left=Math.random()*90+'%';
  n.style.bottom='60px';
  n.style.color='rgba(255,215,0,'+(Math.random()*0.5+0.3)+')';
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}
setInterval(spawnNote,3000);

// GAME DATA
const prizes=['R1 000','R2 000','R3 000','R5 000','R10 000','R20 000','R50 000','R75 000','R150 000','R250 000','R500 000','R750 000','R1 000 000'];
const milestones=[4,9];
const questions=[
  {q:"Die regering beplan om besteding aan openbare hospitale en onderwys te verhoog en moet meer belasting invorder. Hierdie plan is deel van die:",a:["Rekeningkundige vergelyking","Nasionale begroting","Lewenstandaard","Brondokument"],c:1},
  {q:"'n Kliënt koop goedere en betaal kontant. Watter brondokument moet die besigheid aan die kliënt uitreik as bewys van betaling?",a:["Kwitansie","Faktuur","Depositostrokie","Kredietnota"],c:0},
  {q:"Watter faktor het die GROOTSTE impak op die verbetering van 'n persoon se lewenstandaard?",a:["Slegs toegang tot luukse goedere","Om 'n hoë inkomste en toegang tot dienste te hê","Geen vervoer hê nie","Om ver van skole af te woon"],c:1},
  {q:"Waarom is brondokumente belangrik in rekeningkunde?",a:["Hulle verminder besigheidsuitgawes","Hulle verhoog aanspreeklikhede","Hulle verskaf bewys van transaksies","Hulle verhoog besigheidswinste"],c:2},
  {q:"'n Besigheid het bates ter waarde van R20 000 en laste van R8 000. Wat is die eienaarsbelang?",a:["R20 000","R28 000","R8 000","R12 000"],c:3},
  {q:"Wat beskryf 'ekonomiese ongelykheid' die beste?",a:["Geld in die bank deponeer","Die mate van rykdom wat 'n persoon besit","Die gaping in rykdom en inkomste tussen ryk en arm","Sekere groepe se sosiale status"],c:2},
  {q:"Wanneer word 'n bankdepositostrokie gebruik?",a:["Om 'n faktuur te betaal","Wanneer geld in die besigheid se bankrekening gedeponeer word","Om kontantverkope aan te teken","Om 'n lening te kry"],c:1},
  {q:"Wat is die doel van 'n kasregisterrol (KRR)?",a:["Bewys van 'n banktransaksie","Een tipe lening","Om kontantverkope op 'n kasregister aan te teken","Die rekeningkundige vergelyking"],c:2},
  {q:"Wat is 'sosiale ongelykheid'?",a:["Die gaping in inkomste tussen ryk en arm","Wanneer sekere groepe nie dieselfde sosiale status en toegang tot hulpbronne het nie","Die nasionale begroting se tekorte","Wanneer een persoon meer belasting betaal"],c:1},
  {q:"Watter indirekte belasting betaal jy wanneer jy kruideniersware by SPAR koop?",a:["Invoerbelasting","Brandstofheffing","BTW (Belasting op Toegevoegde Waarde)","Inkomstebelasting"],c:2},
  {q:"Watter belasting betaal jy wanneer jy items van 'n aanlyn platform soos Amazon invoer?",a:["BTW","Invoerbelasting","Brandstofheffing","Dividendbelasting"],c:1},
  {q:"Bianca deponeer R14 000 kapitaal in haar besigheidsrekening. Wat gebeur met die bates?",a:["Bates verminder met R14 000","Bates bly dieselfde","Bates verhoog met R14 000","Laste verhoog met R14 000"],c:2},
  {q:"Bianca betaal huur van R5 500 kontant. Wat is die effek op die rekeningkundige vergelyking?",a:["Bates verhoog, uitgawes verminder","Bates verminder, uitgawes verhoog","Laste verhoog, bates bly dieselfde","Eienaarsbelang verhoog"],c:1},
  {q:"Thabo stap 3 km skool toe en het geen internet nie. Ayesha word gery en het internet. Watter konsep beskryf hierdie verskil?",a:["Ekonomiese groei","Verskil in lewenstandaard","Nasionale begroting","Finansiële geletterdheid"],c:1},
  {q:"Hoe kan onderwys 'n persoon se toekomstige lewenstandaard verbeter?",a:["Dit verlaag belasting outomaties","Dit gee toegang tot beter werk en hoër inkomste","Dit verminder lewenskoste outomaties","Dit sorg vir gratis behuising"],c:1}
];

let profile={},currentQ=0,usedLifelines={f5050:false,fAud:false,fFriend:false},answered=false,hiddenAnswers=[];

function startGame(){
  const naam=document.getElementById('pNaam').value.trim();
  const van=document.getElementById('pVan').value.trim();
  const graad=document.getElementById('pGraad').value;
  const klas=document.getElementById('pKlas').value.trim();
  if(!naam||!van||!graad||!klas){alert('Vul asseblief al jou besonderhede in!');return;}
  profile={naam,van,graad,klas};
  currentQ=0;
  usedLifelines={f5050:false,fAud:false,fFriend:false};
  hiddenAnswers=[];
  document.getElementById('profileScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  buildLadder();loadQuestion();
}

function buildLadder(){
  const ladder=document.getElementById('prizeLadder');
  ladder.innerHTML='';
  for(let i=prizes.length-1;i>=0;i--){
    const div=document.createElement('div');
    div.className='prize-item'+(milestones.includes(i)?' milestone':'');
    div.id='prize_'+i;
    div.textContent=prizes[i];
    ladder.appendChild(div);
  }
  updateLadder();
}

function updateLadder(){
  prizes.forEach((_,i)=>{
    const el=document.getElementById('prize_'+i);
    if(!el)return;
    el.className='prize-item';
    if(milestones.includes(i))el.className+=' milestone';
    if(i===currentQ)el.className+=' current';
    if(i<currentQ)el.className+=' passed';
  });
}

function loadQuestion(){
  answered=false;hiddenAnswers=[];
  document.getElementById('ll5050').disabled=usedLifelines.f5050;
  document.getElementById('llAud').disabled=usedLifelines.fAud;
  document.getElementById('llFriend').disabled=usedLifelines.fFriend;
  const q=questions[currentQ];
  document.getElementById('qNum').textContent=currentQ+1;
  document.getElementById('questionNum').textContent='Vraag '+(currentQ+1)+' van 15';
  document.getElementById('currentPrize').textContent=prizes[currentQ];
  document.getElementById('questionText').textContent=q.q;
  updateLadder();
  const letters=['A','B','C','D'];
  const grid=document.getElementById('answersGrid');
  grid.innerHTML='';
  q.a.forEach((ans,i)=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';btn.id='ans_'+i;
    btn.innerHTML=`<div class="ans-btn-inner"><span class="letter">${letters[i]}</span>${ans}</div>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=questions[currentQ];
  document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true);
  const chosen=document.getElementById('ans_'+idx);
  setTimeout(()=>{
    if(idx===q.c){
      chosen.classList.add('correct');
      playCorrect();
      setTimeout(()=>{
        if(currentQ>=prizes.length-1){showResult(true);return;}
        currentQ++;loadQuestion();
      },1800);
    }else{
      chosen.classList.add('wrong');
      document.getElementById('ans_'+q.c).classList.add('correct');
      playWrong();
      setTimeout(()=>showResult(false),2000);
    }
  },600);
}

function use5050(){
  if(usedLifelines.f5050||answered)return;
  playLifeline();
  usedLifelines.f5050=true;
  document.getElementById('ll5050').disabled=true;
  const q=questions[currentQ];
  const wrongs=[0,1,2,3].filter(i=>i!==q.c&&!hiddenAnswers.includes(i));
  wrongs.sort(()=>Math.random()-0.5).slice(0,2).forEach(i=>{
    document.getElementById('ans_'+i).classList.add('hidden');
    hiddenAnswers.push(i);
  });
}

function useAudience(){
  if(usedLifelines.fAud||answered)return;
  playLifeline();
  usedLifelines.fAud=true;
  document.getElementById('llAud').disabled=true;
  const q=questions[currentQ];
  const pcts=[0,0,0,0];
  pcts[q.c]=Math.floor(Math.random()*25)+55;
  let rem=100-pcts[q.c];
  const others=[0,1,2,3].filter(i=>i!==q.c&&!hiddenAnswers.includes(i));
  others.forEach((i,idx)=>{
    pcts[i]=idx===others.length-1?rem:Math.floor(Math.random()*rem*0.5);
    rem-=pcts[i];
  });
  const letters=['A','B','C','D'];
  showModal('📊 Publiek Stem',`
    <div class="audience-bars">
      ${pcts.map((p,i)=>hiddenAnswers.includes(i)?'':
        `<div class="bar-wrap">
          <div class="bar-pct">${p}%</div>
          <div class="bar" style="height:${Math.max(p*0.85,4)}px;"></div>
          <div class="bar-label">${letters[i]}</div>
        </div>`).join('')}
    </div>
  `,[{label:'Dankie!',fn:'closeModal()'}]);
}

function useFriend(){
  if(usedLifelines.fFriend||answered)return;
  playLifeline();
  usedLifelines.fFriend=true;
  document.getElementById('llFriend').disabled=true;
  const q=questions[currentQ];
  const letters=['A','B','C','D'];
  showModal("📱 Bel 'n Vriend",`
    <p>Draai na 'n klasmaat en wys hulle hierdie skerm!</p>
    <div class="friend-qa">
      <strong style="color:#FFD700;">Vraag:</strong><br>${q.q}<br><br>
      ${q.a.map((a,i)=>`<strong style="color:#FFD700;">${letters[i]}:</strong> ${a}`).join('<br>')}
    </div>
    <p>Vra: "Watter antwoord dink jy is reg?"</p>
  `,[{label:'Terug na Spel',fn:'closeModal()'}]);
}

function showModal(title,content,btns){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalContent').innerHTML=content;
  document.getElementById('modalBtns').innerHTML=btns.map(b=>
    `<button class="btn-modal" onclick="${b.fn}">${b.label}</button>`).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function showResult(won){
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('resultScreen').classList.add('active');
  if(won)playWin();
  const safeIdx=currentQ>9?9:currentQ>4?4:-1;
  const safePrize=safeIdx>=0?prizes[safeIdx]:'R0';
  const finalPrize=won?'R1 000 000':(currentQ===0?'R0':safePrize);
  document.getElementById('resultIcon').textContent=won?'🏆':currentQ>4?'🎖️':'😢';
  document.getElementById('resultPrize').textContent=won?'R1 000 000!':finalPrize+(currentQ>0&&!won?' (Veilige bedrag)':'');
  document.getElementById('resultName').textContent=`${profile.naam} ${profile.van} | ${profile.graad} ${profile.klas}`;
  const now=new Date();
  const dateStr=now.toLocaleDateString('af-ZA')+' '+now.toLocaleTimeString('af-ZA',{hour:'2-digit',minute:'2-digit'});
  const code=`${profile.naam[0]}${profile.van[0]}-${profile.graad.replace('Graad ','G')}-${profile.klas}-V${currentQ}-${now.getTime().toString(36).slice(-5).toUpperCase()}`;
  document.getElementById('proofCode').textContent='Kode: '+code;
  document.getElementById('proofDate').textContent=dateStr;
}

function resetGame(){
  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('profileScreen').classList.add('active');
  startBgMusic();
}
</script>
</body>
</html>
