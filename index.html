<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Who Wants to be a South African Millionaire?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Open Sans',sans-serif;background:#000;color:white;display:flex;justify-content:center;align-items:center}

/* PHONE FRAME */
.phone{width:100%;max-width:420px;height:100vh;max-height:900px;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* BACKGROUNDS */
.bg-profile{position:absolute;inset:0;background:linear-gradient(160deg,#001a0a 0%,#003d1a 30%,#001433 60%,#000a1a 100%);z-index:0}
.bg-game{position:absolute;inset:0;background:linear-gradient(160deg,#0a001a 0%,#1a0033 30%,#000d33 60%,#001a0a 100%);z-index:0}
.bg-lb{position:absolute;inset:0;background:linear-gradient(160deg,#001433 0%,#000d26 50%,#001a0a 100%);z-index:0}

/* STARS */
.stars{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.8}}

/* SA FLAG ACCENT */
.sa-bar{position:absolute;top:0;left:0;right:0;height:5px;z-index:10;display:flex}
.sa-bar div{flex:1}
.sa-r{background:#E03C31}
.sa-w{background:#fff;flex:0.3!important}
.sa-g{background:#007A4D}
.sa-w2{background:#fff;flex:0.3!important}
.sa-b{background:#002395}
.sa-gold{background:#FFB612;flex:0.5!important}

/* SCREENS */
.screen{display:none;position:absolute;inset:0;z-index:5;flex-direction:column;align-items:center;overflow-y:auto;padding:20px 16px 80px}
.screen.active{display:flex}

/* PROFILE SCREEN */
.logo-wrap{text-align:center;margin:30px 0 20px}
.sa-flag-icon{font-size:2.5rem;margin-bottom:8px}
.game-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;line-height:1.3;text-align:center;background:linear-gradient(180deg,#fff 0%,#FFB612 50%,#E03C31 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.game-sub{color:#888;font-size:0.75rem;text-align:center;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.brand{color:#FFB612;font-size:0.65rem;text-align:center;margin-top:4px;letter-spacing:3px;opacity:0.7}

.input-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,182,18,0.3);border-radius:16px;padding:20px;width:100%;margin-bottom:16px}
.input-group{margin-bottom:12px}
.input-group:last-child{margin-bottom:0}
.input-group label{display:block;font-size:10px;color:#FFB612;margin-bottom:5px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.input-group input,.input-group select{width:100%;padding:12px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,182,18,0.2);border-radius:10px;color:white;font-size:14px;font-family:'Open Sans',sans-serif}
.input-group input:focus,.input-group select:focus{outline:none;border-color:#FFB612}
.input-group select option{background:#001a0a}

.btn-play{width:100%;background:linear-gradient(135deg,#FFB612,#E03C31);color:#fff;border:none;border-radius:50px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 20px rgba(255,182,18,0.4);margin-top:8px;transition:all 0.3s}
.btn-play:active{transform:scale(0.97)}

/* TOP BAR */
.top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:8px;flex-shrink:0}
.prize-banner{flex:1;text-align:center;background:linear-gradient(135deg,#7B1FA2,#4A148C);border:2px solid #FFB612;border-radius:50px;padding:8px 16px;box-shadow:0 0 15px rgba(255,182,18,0.3)}
.prize-label{font-size:9px;color:#FFB612;text-transform:uppercase;letter-spacing:1px}
.prize-amount{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;color:#FFB612;text-shadow:0 0 10px rgba(255,182,18,0.5)}
.q-counter{font-size:10px;color:#888;text-align:center;margin-top:2px}

/* QUESTION BOX */
.q-box{width:100%;background:linear-gradient(135deg,rgba(74,20,140,0.6),rgba(26,0,51,0.8));border:2px solid rgba(255,182,18,0.5);border-radius:16px;padding:16px;text-align:center;margin:8px 0;flex-shrink:0}
.q-text{font-size:0.95rem;line-height:1.5;color:#fff;font-weight:600}

/* ANSWER BUTTONS */
.answers{width:100%;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.ans-btn{width:100%;background:linear-gradient(135deg,rgba(0,61,26,0.7),rgba(0,36,15,0.9));border:2px solid rgba(0,122,77,0.6);border-radius:50px;padding:13px 20px;color:white;cursor:pointer;font-size:0.9rem;font-family:'Open Sans',sans-serif;font-weight:600;display:flex;align-items:center;gap:12px;transition:all 0.2s;text-align:left}
.ans-btn:active:not(:disabled){transform:scale(0.98)}
.ans-letter{width:30px;height:30px;border-radius:50%;background:rgba(255,182,18,0.2);border:2px solid #FFB612;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#FFB612;flex-shrink:0}
.ans-text{flex:1}
.ans-btn.correct{background:linear-gradient(135deg,rgba(0,122,77,0.9),rgba(0,80,50,0.95));border-color:#007A4D;box-shadow:0 0 20px rgba(0,122,77,0.5)}
.ans-btn.correct .ans-letter{background:rgba(0,122,77,0.4);border-color:#007A4D;color:#00ff88}
.ans-btn.wrong{background:linear-gradient(135deg,rgba(224,60,49,0.9),rgba(150,30,20,0.95));border-color:#E03C31;box-shadow:0 0 20px rgba(224,60,49,0.5)}
.ans-btn.wrong .ans-letter{background:rgba(224,60,49,0.4);border-color:#E03C31;color:#ff6666}
.ans-btn.hidden{opacity:0.1;pointer-events:none}
.ans-btn:disabled{cursor:default}

/* LIFELINES BOTTOM */
.lifeline-bar{position:absolute;bottom:0;left:0;right:0;z-index:20;background:linear-gradient(0deg,rgba(0,0,0,0.95),rgba(0,0,0,0.7));padding:10px 20px;display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,182,18,0.2)}
.ll-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative}
.ll-bubble{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;border:3px solid rgba(255,182,18,0.6);background:radial-gradient(circle at 35% 35%,rgba(255,182,18,0.4),rgba(100,50,0,0.8));box-shadow:0 0 12px rgba(255,182,18,0.3);transition:all 0.3s;position:relative}
.ll-item.used .ll-bubble{opacity:0.3;filter:grayscale(1);border-color:rgba(255,0,0,0.3)}
.ll-cross{display:none;position:absolute;inset:0;border-radius:50%;align-items:center;justify-content:center;font-size:2rem;color:#E03C31;font-weight:900;background:rgba(0,0,0,0.5)}
.ll-item.used .ll-cross{display:flex}
.ll-name{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px}
.ll-item.used .ll-name{color:#555}

/* LEADERBOARD */
.lb-wrap{width:100%;max-width:360px}
.lb-header{text-align:center;margin-bottom:16px}
.lb-icon{font-size:2.5rem;margin-bottom:8px}
.lb-title{font-family:'Cinzel',serif;font-size:1.2rem;color:#FFB612;margin-bottom:4px}
.lb-sub{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
.prize-row{display:flex;align-items:center;padding:7px 12px;border-radius:8px;margin-bottom:3px;transition:all 0.3s;position:relative}
.pr-num{font-size:10px;color:#555;width:20px;text-align:right;margin-right:10px;font-weight:700}
.pr-amt{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;flex:1;text-align:center}
.pr-dot{width:8px;height:8px;border-radius:50%;margin-left:8px;flex-shrink:0}
.prize-row.pr-normal{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}
.prize-row.pr-normal .pr-amt{color:#666}
.prize-row.pr-milestone{background:rgba(0,122,77,0.1);border:1px solid rgba(0,122,77,0.25)}
.prize-row.pr-milestone .pr-amt{color:#00c864}
.prize-row.pr-current{background:linear-gradient(135deg,rgba(255,182,18,0.25),rgba(224,60,49,0.15));border:2px solid #FFB612;box-shadow:0 0 15px rgba(255,182,18,0.2)}
.prize-row.pr-current .pr-amt{color:#FFB612;font-size:1.1rem}
.prize-row.pr-current::before{content:'▶';position:absolute;left:4px;color:#FFB612;font-size:11px}
.prize-row.pr-passed{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.03)}
.prize-row.pr-passed .pr-amt{color:#2a2a2a;text-decoration:line-through}
.prize-row.pr-passed .pr-dot{background:#007A4D}

.btn-next{width:100%;background:linear-gradient(135deg,#FFB612,#E03C31);color:#fff;border:none;border-radius:50px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 20px rgba(255,182,18,0.4);margin-top:16px;animation:btnGlow 1.5s ease-in-out infinite}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 15px rgba(255,182,18,0.3)}50%{box-shadow:0 4px 30px rgba(255,182,18,0.7)}}
.btn-next:active{transform:scale(0.97)}

/* RESULT */
.result-wrap{text-align:center;padding:20px 0}
.result-icon{font-size:5rem;margin-bottom:16px;animation:bounceIn 0.6s}
@keyframes bounceIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-prize{font-family:'Cinzel',serif;font-size:2rem;background:linear-gradient(180deg,#fff,#FFB612,#E03C31);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;margin-bottom:8px}
.result-name{color:#888;font-size:12px;margin-bottom:20px}
.proof-card{background:rgba(255,182,18,0.08);border:1px solid rgba(255,182,18,0.3);border-radius:16px;padding:16px;margin-bottom:20px;width:100%}
.proof-label{color:#888;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.proof-code{color:#FFB612;font-size:14px;font-weight:700;letter-spacing:2px;font-family:'Cinzel',serif}
.proof-date{color:#444;font-size:10px;margin-top:6px}

/* MODAL */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:linear-gradient(135deg,#0a001a,#001a0a);border:2px solid #FFB612;border-radius:20px;padding:24px;width:85%;text-align:center;box-shadow:0 0 40px rgba(255,182,18,0.3)}
.modal-box h3{font-family:'Cinzel',serif;color:#FFB612;margin-bottom:12px;font-size:1.1rem}
.modal-box p{color:#ccc;font-size:13px;line-height:1.6;margin-bottom:8px}
.modal-btns{margin-top:16px}
.btn-modal{background:linear-gradient(135deg,#FFB612,#E03C31);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;width:100%}
.audience-bars{display:flex;gap:10px;align-items:flex-end;height:90px;margin:12px 0;justify-content:center}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:44px;background:linear-gradient(180deg,#FFB612,#E03C31);border-radius:4px 4px 0 0;transition:height 1.2s cubic-bezier(0.34,1.56,0.64,1);min-height:3px}
.bar-label{font-size:11px;color:#aaa}
.bar-pct{font-size:11px;color:#FFB612;font-weight:700}
.friend-qa{background:rgba(0,0,0,0.5);border:1px solid rgba(255,182,18,0.2);border-radius:10px;padding:12px;margin:10px 0;font-size:12px;color:#ddd;text-align:left;line-height:1.8}

.music-note{position:absolute;font-size:1.2rem;animation:floatUp 3s ease-in forwards;z-index:1;pointer-events:none}
@keyframes floatUp{0%{opacity:0.8;transform:translateY(0)}100%{opacity:0;transform:translateY(-150px)}}

footer{position:absolute;bottom:0;left:0;right:0;text-align:center;padding:3px;font-size:9px;color:#1a1a1a;z-index:1}
</style>
</head>
<body>
<div class="phone" id="phone">

  <!-- SA FLAG BAR -->
  <div class="sa-bar">
    <div class="sa-r"></div>
    <div class="sa-w"></div>
    <div class="sa-g"></div>
    <div class="sa-gold"></div>
    <div class="sa-g"></div>
    <div class="sa-w2"></div>
    <div class="sa-b"></div>
  </div>

  <!-- AUDIO -->
  <audio id="bgMusic" loop><source src="South African Millionaire.mp3" type="audio/mpeg"></audio>

  <!-- PROFILE SCREEN -->
  <div id="profileScreen" class="screen active">
    <div class="bg-profile"></div>
    <div class="stars" id="stars"></div>
    <div class="logo-wrap" style="position:relative;z-index:5;width:100%">
      <div class="sa-flag-icon">🇿🇦</div>
      <div class="game-title">Who Wants to be a<br>South African<br>Millionaire?</div>
      <div class="game-sub">Graad 8 · EBW</div>
      <div class="brand">Lunax Learning</div>
    </div>
    <div class="input-card" style="position:relative;z-index:5">
      <div class="input-group"><label>Naam</label><input id="pNaam" placeholder="Jou naam"/></div>
      <div class="input-group"><label>Van</label><input id="pVan" placeholder="Jou van"/></div>
      <div class="input-group"><label>Graad</label>
        <select id="pGraad">
          <option value="">Kies graad...</option>
          <option>Graad 8</option><option>Graad 9</option>
          <option>Graad 10</option><option>Graad 11</option><option>Graad 12</option>
        </select>
      </div>
      <div class="input-group"><label>Klas</label><input id="pKlas" placeholder="bv. 8A"/></div>
    </div>
    <button class="btn-play" onclick="startGame()" style="position:relative;z-index:5;width:100%">🎮 Speel Nou!</button>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div id="leaderboardScreen" class="screen" style="padding-bottom:20px">
    <div class="bg-lb"></div>
    <div class="stars" id="stars2"></div>
    <div class="lb-wrap" style="position:relative;z-index:5">
      <div class="lb-header">
        <div class="lb-icon" id="lbIcon">🎯</div>
        <div class="lb-title" id="lbTitle">Jou Reis Begin!</div>
        <div class="lb-sub" id="lbSub">Beantwoord vraag 1</div>
      </div>
      <div id="prizeList"></div>
      <button class="btn-next" id="lbBtn" onclick="goToQuestion()">▶ Begin!</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen" style="padding-bottom:90px;justify-content:flex-start;padding-top:12px">
    <div class="bg-game"></div>
    <div class="top-bar" style="position:relative;z-index:5">
      <div class="prize-banner">
        <div class="prize-label">Huidige Prys</div>
        <div class="prize-amount" id="currentPrize">R1 000</div>
        <div class="q-counter">Vraag <span id="qNum">1</span> van 15</div>
      </div>
    </div>
    <div class="q-box" style="position:relative;z-index:5">
      <div class="q-text" id="questionText">Laai vraag...</div>
    </div>
    <div class="answers" id="answersGrid" style="position:relative;z-index:5"></div>
    <!-- LIFELINES -->
    <div class="lifeline-bar">
      <div class="ll-item" id="ll5050" onclick="use5050()">
        <div class="ll-bubble">50/50<div class="ll-cross">✕</div></div>
        <div class="ll-name">50/50</div>
      </div>
      <div class="ll-item" id="llAud" onclick="useAudience()">
        <div class="ll-bubble">👥<div class="ll-cross">✕</div></div>
        <div class="ll-name">Publiek</div>
      </div>
      <div class="ll-item" id="llFriend" onclick="useFriend()">
        <div class="ll-bubble">📱<div class="ll-cross">✕</div></div>
        <div class="ll-name">Vriend</div>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="screen">
    <div class="bg-lb"></div>
    <div class="result-wrap" style="position:relative;z-index:5;width:100%">
      <div class="result-icon" id="resultIcon">🏆</div>
      <div class="result-prize" id="resultPrize"></div>
      <div class="result-name" id="resultName"></div>
      <div class="proof-card">
        <div class="proof-label">Wys vir jou onderwyser as bewys</div>
        <div class="proof-code" id="proofCode"></div>
        <div class="proof-date" id="proofDate"></div>
      </div>
      <button class="btn-play" onclick="resetGame()">↩ Speel Weer</button>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <div id="modalContent"></div>
      <div class="modal-btns" id="modalBtns"></div>
    </div>
  </div>

  <footer>© 2026 Lunax Learning</footer>
</div>

<script>
// STARS
function makeStars(id){
  const s=document.getElementById(id);
  if(!s)return;
  for(let i=0;i<80;i++){
    const d=document.createElement('div');d.className='star';
    const sz=Math.random()*2+0.5;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*0.6+0.1};animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s`;
    s.appendChild(d);
  }
}
makeStars('stars');makeStars('stars2');

// MUSIC
const bgMusic=document.getElementById('bgMusic');
bgMusic.volume=0.4;
function startBgMusic(){bgMusic.play().catch(()=>{});}
function stopBgMusic(){bgMusic.pause();bgMusic.currentTime=0;}
window.addEventListener('load',()=>setTimeout(startBgMusic,600));
document.addEventListener('click',startBgMusic,{once:true});
document.addEventListener('touchstart',startBgMusic,{once:true});

// SFX
const AC=window.AudioContext||window.webkitAudioContext;
let actx;
function gc(){if(!actx)actx=new AC();if(actx.state==='suspended')actx.resume();return actx;}
function tone(f,t,v,s,d){const c=gc(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime+s);g.gain.linearRampToValueAtTime(v,c.currentTime+s+0.02);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+s+d);o.start(c.currentTime+s);o.stop(c.currentTime+s+d+0.05);}
function playCorrect(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',0.3,i*0.1,0.3));}
function playWrong(){[300,250,200,150].forEach((f,i)=>tone(f,'sawtooth',0.25,i*0.15,0.3));}
function playWin(){[523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f,'sine',0.4,i*0.15,0.4));}
function playAdvance(){[440,550,660,880].forEach((f,i)=>tone(f,'sine',0.2,i*0.08,0.2));}
function playLifeline(){[440,550,660].forEach((f,i)=>tone(f,'sine',0.2,i*0.1,0.2));}

function spawnNote(){
  const phone=document.getElementById('phone');
  const n=document.createElement('div');n.className='music-note';
  n.textContent=['♩','♪','♫','♬'][Math.floor(Math.random()*4)];
  n.style.left=Math.random()*80+'%';n.style.bottom='80px';
  n.style.color=`rgba(255,182,18,${Math.random()*0.5+0.3})`;
  phone.appendChild(n);setTimeout(()=>n.remove(),3000);
}
let noteInt;

// GAME DATA
const prizes=['R1 000','R2 000','R3 000','R5 000','R10 000','R20 000','R50 000','R75 000','R150 000','R250 000','R500 000','R750 000','R1 000 000'];
const milestones=[4,9];
const questions=[
  {q:"Die regering beplan om besteding aan openbare hospitale en onderwys te verhoog en moet meer belasting invorder. Hierdie plan is deel van die:",a:["Rekeningkundige vergelyking","Nasionale begroting","Lewenstandaard","Brondokument"],c:1},
  {q:"'n Kliënt koop goedere en betaal kontant. Watter brondokument moet die besigheid aan die kliënt uitreik as bewys van betaling?",a:["Kwitansie","Faktuur","Depositostrokie","Kredietnota"],c:0},
  {q:"Watter faktor het die GROOTSTE impak op die verbetering van 'n persoon se lewenstandaard?",a:["Slegs toegang tot luukse goedere","Om 'n hoë inkomste en toegang tot dienste te hê","Geen vervoer hê nie","Om ver van skole af te woon"],c:1},
  {q:"Waarom is brondokumente belangrik in rekeningkunde?",a:["Hulle verminder besigheidsuitgawes","Hulle verhoog aanspreeklikhede","Hulle verskaf bewys van transaksies","Hulle verhoog besigheidswinste"],c:2},
  {q:"'n Besigheid het bates ter waarde van R20 000 en laste van R8 000. Wat is die eienaarsbelang?",a:["R20 000","R28 000","R8 000","R12 000"],c:3},
  {q:"Wat beskryf 'ekonomiese ongelykheid' die beste?",a:["Geld in die bank deponeer","Die mate van rykdom wat 'n persoon besit","Die gaping in rykdom en inkomste tussen ryk en arm","Sekere groepe se sosiale status"],c:2},
  {q:"Wanneer word 'n bankdepositostrokie gebruik?",a:["Om 'n faktuur te betaal","Wanneer geld in die besigheid se bankrekening gedeponeer word","Om kontantverkope aan te teken","Om 'n lening te kry"],c:1},
  {q:"Wat is die doel van 'n kasregisterrol (KRR)?",a:["Bewys van 'n banktransaksie","Een tipe lening","Om kontantverkope op 'n kasregister aan te teken","Die rekeningkundige vergelyking"],c:2},
  {q:"Wat is 'sosiale ongelykheid'?",a:["Die gaping in inkomste tussen ryk en arm","Wanneer sekere groepe nie dieselfde sosiale status en toegang tot hulpbronne het nie","Die nasionale begroting se tekorte","Wanneer een persoon meer belasting betaal"],c:1},
  {q:"Watter indirekte belasting betaal jy wanneer jy kruideniersware by SPAR koop?",a:["Invoerbelasting","Brandstofheffing","BTW (Belasting op Toegevoegde Waarde)","Inkomstebelasting"],c:2},
  {q:"Watter belasting betaal jy wanneer jy items van 'n aanlyn platform soos Amazon invoer?",a:["BTW","Invoerbelasting","Brandstofheffing","Dividendbelasting"],c:1},
  {q:"Bianca deponeer R14 000 kapitaal in haar besigheidsrekening. Wat gebeur met die bates?",a:["Bates verminder met R14 000","Bates bly dieselfde","Bates verhoog met R14 000","Laste verhoog met R14 000"],c:2},
  {q:"Bianca betaal huur van R5 500 kontant. Wat is die effek op die rekeningkundige vergelyking?",a:["Bates verhoog, uitgawes verminder","Bates verminder, uitgawes verhoog","Laste verhoog, bates bly dieselfde","Eienaarsbelang verhoog"],c:1},
  {q:"Thabo stap 3 km skool toe en het geen internet nie. Ayesha word gery en het internet. Watter konsep beskryf hierdie verskil?",a:["Ekonomiese groei","Verskil in lewenstandaard","Nasionale begroting","Finansiële geletterdheid"],c:1},
  {q:"Hoe kan onderwys 'n persoon se toekomstige lewenstandaard verbeter?",a:["Dit verlaag belasting outomaties","Dit gee toegang tot beter werk en hoër inkomste","Dit verminder lewenskoste outomaties","Dit sorg vir gratis behuising"],c:1}
];

let profile={},currentQ=0,usedLifelines={f5050:false,fAud:false,fFriend:false},answered=false,hiddenAnswers=[];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop=0;
}

function startGame(){
  const naam=document.getElementById('pNaam').value.trim();
  const van=document.getElementById('pVan').value.trim();
  const graad=document.getElementById('pGraad').value;
  const klas=document.getElementById('pKlas').value.trim();
  if(!naam||!van||!graad||!klas){alert('Vul asseblief al jou besonderhede in!');return;}
  profile={naam,van,graad,klas};
  currentQ=0;
  usedLifelines={f5050:false,fAud:false,fFriend:false};
  hiddenAnswers=[];
  stopBgMusic();
  noteInt=setInterval(spawnNote,3500);
  showLeaderboard(true);
}

function showLeaderboard(first){
  buildPrizeList();
  if(first){
    document.getElementById('lbIcon').textContent='🎯';
    document.getElementById('lbTitle').textContent='Jou Reis Begin!';
    document.getElementById('lbSub').textContent='Beantwoord Vraag 1 vir '+prizes[0];
    document.getElementById('lbBtn').textContent='▶ Begin!';
  }else{
    playAdvance();
    document.getElementById('lbIcon').textContent='✅';
    document.getElementById('lbTitle').textContent='Uitstekend!';
    document.getElementById('lbSub').textContent=currentQ<prizes.length?'Volgende: '+prizes[currentQ]:'Jy is by die top!';
    document.getElementById('lbBtn').textContent='▶ Volgende Vraag';
  }
  showScreen('leaderboardScreen');
}

function buildPrizeList(){
  const list=document.getElementById('prizeList');
  list.innerHTML='';
  for(let i=prizes.length-1;i>=0;i--){
    const row=document.createElement('div');
    row.className='prize-row';
    const num=document.createElement('div');num.className='pr-num';num.textContent=i+1;
    const amt=document.createElement('div');amt.className='pr-amt';amt.textContent=prizes[i];
    const dot=document.createElement('div');dot.className='pr-dot';
    row.appendChild(num);row.appendChild(amt);row.appendChild(dot);
    if(i===currentQ){row.classList.add('pr-current');dot.style.background='#FFB612';}
    else if(i<currentQ){row.classList.add('pr-passed');dot.style.background='#007A4D';}
    else if(milestones.includes(i)){row.classList.add('pr-milestone');dot.style.background='#00c864';}
    else{row.classList.add('pr-normal');dot.style.background='#333';}
    list.appendChild(row);
  }
}

function goToQuestion(){
  loadQuestion();
  showScreen('gameScreen');
}

function loadQuestion(){
  answered=false;hiddenAnswers=[];
  updateLifelines();
  const q=questions[currentQ];
  document.getElementById('qNum').textContent=currentQ+1;
  document.getElementById('currentPrize').textContent=prizes[currentQ];
  document.getElementById('questionText').textContent=q.q;
  const letters=['A','B','C','D'];
  const grid=document.getElementById('answersGrid');
  grid.innerHTML='';
  q.a.forEach((ans,i)=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';btn.id='ans_'+i;
    btn.innerHTML=`<span class="ans-letter">${letters[i]}</span><span class="ans-text">${ans}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
}

function updateLifelines(){
  ['ll5050','llAud','llFriend'].forEach((id,i)=>{
    const used=[usedLifelines.f5050,usedLifelines.fAud,usedLifelines.fFriend][i];
    document.getElementById(id).className='ll-item'+(used?' used':'');
  });
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=questions[currentQ];
  document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true);
  setTimeout(()=>{
    if(idx===q.c){
      document.getElementById('ans_'+idx).classList.add('correct');
      playCorrect();
      setTimeout(()=>{
        currentQ++;
        if(currentQ>=prizes.length)showResult(true);
        else showLeaderboard(false);
      },1800);
    }else{
      document.getElementById('ans_'+idx).classList.add('wrong');
      document.getElementById('ans_'+q.c).classList.add('correct');
      playWrong();
      setTimeout(()=>showResult(false),2000);
    }
  },600);
}

function use5050(){
  if(usedLifelines.f5050||answered)return;
  playLifeline();usedLifelines.f5050=true;updateLifelines();
  const q=questions[currentQ];
  const wrongs=[0,1,2,3].filter(i=>i!==q.c&&!hiddenAnswers.includes(i));
  wrongs.sort(()=>Math.random()-0.5).slice(0,2).forEach(i=>{document.getElementById('ans_'+i).classList.add('hidden');hiddenAnswers.push(i);});
}

function useAudience(){
  if(usedLifelines.fAud||answered)return;
  playLifeline();usedLifelines.fAud=true;updateLifelines();
  const q=questions[currentQ];
  const pcts=[0,0,0,0];
  pcts[q.c]=Math.floor(Math.random()*25)+55;
  let rem=100-pcts[q.c];
  const others=[0,1,2,3].filter(i=>i!==q.c&&!hiddenAnswers.includes(i));
  others.forEach((i,idx)=>{pcts[i]=idx===others.length-1?rem:Math.floor(Math.random()*rem*0.5);rem-=pcts[i];});
  const letters=['A','B','C','D'];
  showModal('📊 Publiek Stem',`<div class="audience-bars">${pcts.map((p,i)=>hiddenAnswers.includes(i)?'':
    `<div class="bar-wrap"><div class="bar-pct">${p}%</div><div class="bar" style="height:${Math.max(p*0.8,3)}px;"></div><div class="bar-label">${letters[i]}</div></div>`).join('')}</div>`,
    [{label:'Dankie!',fn:'closeModal()'}]);
}

function useFriend(){
  if(usedLifelines.fFriend||answered)return;
  playLifeline();usedLifelines.fFriend=true;updateLifelines();
  const q=questions[currentQ];
  const letters=['A','B','C','D'];
  showModal("📱 Bel 'n Vriend",`<p>Wys hierdie skerm vir 'n klasmaat!</p>
    <div class="friend-qa"><strong style="color:#FFB612;">Vraag:</strong><br>${q.q}<br><br>
    ${q.a.map((a,i)=>`<strong style="color:#FFB612;">${letters[i]}:</strong> ${a}`).join('<br>')}</div>
    <p>Vra: "Watter antwoord is reg?"</p>`,
    [{label:'Terug na Spel',fn:'closeModal()'}]);
}

function showModal(title,content,btns){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalContent').innerHTML=content;
  document.getElementById('modalBtns').innerHTML=btns.map(b=>`<button class="btn-modal" onclick="${b.fn}">${b.label}</button>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function showResult(won){
  clearInterval(noteInt);
  showScreen('resultScreen');
  if(won)playWin();
  const safeIdx=currentQ>=prizes.length?prizes.length-1:currentQ>9?9:currentQ>4?4:-1;
  const safePrize=safeIdx>=0?prizes[safeIdx]:'R0';
  const finalPrize=won?'R1 000 000':safePrize;
  document.getElementById('resultIcon').textContent=won?'🏆':currentQ>4?'🎖️':'😢';
  document.getElementById('resultPrize').textContent=won?'R1 000 000!':finalPrize+(currentQ>0&&!won?' (Veilige bedrag)':'');
  document.getElementById('resultName').textContent=`${profile.naam} ${profile.van} | ${profile.graad} ${profile.klas}`;
  const now=new Date();
  const code=`${profile.naam[0]}${profile.van[0]}-${profile.graad.replace('Graad ','G')}-${profile.klas}-V${currentQ}-${now.getTime().toString(36).slice(-5).toUpperCase()}`;
  document.getElementById('proofCode').textContent='Kode: '+code;
  document.getElementById('proofDate').textContent=now.toLocaleDateString('af-ZA')+' '+now.toLocaleTimeString('af-ZA',{hour:'2-digit',minute:'2-digit'});
}

function resetGame(){
  showScreen('profileScreen');
  startBgMusic();
}
</script>
